{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | St. Peters Ngoisa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --vatican-gold: #FFD700;
            --vatican-gold-dark: #C9A227;
            --vatican-charcoal: #212529;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 6px solid var(--vatican-gold);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: #fff9db;
            color: var(--vatican-gold-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
        }

        h2 {
            font-weight: 800;
            color: var(--vatican-charcoal);
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #6c757d;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Styling the Django Form Input */
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #ced4da;
            border-radius: 10px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--vatican-gold);
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.2);
        }

        .btn-reset {
            background-color: var(--vatican-charcoal);
            color: var(--vatican-gold);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background-color: #333;
            color: white;
            transform: translateY(-2px);
        }

        .back-to-login {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: var(--vatican-gold-dark);
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="reset-card">
    <div class="icon-box">
        <i class="bi bi-shield-lock"></i>
    </div>
    
    <h2>Forgot Password?</h2>
    <p>Enter your email address below, and we'll email instructions for setting a new one.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            {{ form.email.errors }}
            <label for="{{ form.email.id_for_label }}" class="form-label d-none">Email Address</label>
            {{ form.email }}
        </div>

        <button type="submit" class="btn-reset">
            <i class="bi bi-envelope-at me-2"></i> Send Reset Link
        </button>
    </form>

    <a href="{% url 'Login' %}" class="back-to-login">
        <i class="bi bi-arrow-left me-1"></i> Back to Login
    </a>
</div>

</body>
</html>
