{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | St. Peters Ngoisa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --vatican-gold: #FFD700;
            --vatican-gold-dark: #C9A227;
            --vatican-charcoal: #212529;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-card {
            max-width: 500px;
            width: 90%;
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border-bottom: 8px solid var(--vatican-gold);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: #e8f5e9; /* Light success green */
            color: #2e7d32; /* Success green */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h3 {
            font-weight: 800;
            color: var(--vatican-charcoal);
            margin-bottom: 15px;
        }

        p {
            color: #6c757d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-login {
            background-color: var(--vatican-charcoal);
            color: var(--vatican-gold);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-login:hover {
            background-color: #333;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .help-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="icon-circle">
        <i class="bi bi-envelope-check"></i>
    </div>
    
    <h3>Check Your Email</h3>
    <p>
        If an account exists for the email you entered, we have sent a password reset link to your inbox. 
        Please check your <strong>Spam</strong> or <strong>Junk</strong> folder if you don't see it within a few minutes.
    </p>

    <a href="{% url 'Login' %}" class="btn-login">
        <i class="bi bi-arrow-left me-2"></i> Back to Login
    </a>

    <div class="help-text">
        <i class="bi bi-info-circle me-1"></i> St. Peters Ngoisa Parish Portal
    </div>
</div>

</body>
</html>
