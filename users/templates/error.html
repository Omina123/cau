<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | St. Peters Ngoisa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --vatican-gold: #FFD700;
            --vatican-dark: #212529;
            --vatican-accent: #C9A227;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://www.transparenttextures.com/patterns/cubes.png'),
                        linear-gradient(135deg, var(--vatican-gold), #FFFFFF);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Styling */
        .navbar {
            background-color: var(--vatican-dark) !important;
            border-bottom: 3px solid var(--vatican-gold);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--vatican-gold) !important;
            text-transform: uppercase;
        }

        .nav-link {
            color: #fff !important;
            font-weight: 500;
            margin: 0 10px;
        }

        /* Error Card */
        .error-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            border-top: 6px solid #dc3545; /* Red top border for error */
        }

        .error-icon {
            width: 80px;
            height: 80px;
            background: #fff5f5;
            color: #dc3545;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
        }

        .error-card h2 {
            font-weight: 800;
            color: var(--vatican-dark);
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .error-card p {
            color: #6c757d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-primary {
            background: var(--vatican-dark);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 700;
            color: var(--vatican-gold);
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background-color: #000;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-cross me-2"></i>St. Peters Ngoisa</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container d-flex flex-grow-1 justify-content-center align-items-center py-5">
    <div class="error-card shadow">
        <div class="error-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        
        <h2>{{ title }}</h2>
        <p>{{ message }}</p>

        <div class="d-grid gap-2">
            <a href="{% url 'Login' %}" class="btn btn-primary">
                <i class="bi bi-box-arrow-in-right me-2"></i> Go to Login
            </a>
            <a href="{% url 'register_user' %}" class="btn btn-link text-muted text-decoration-none small mt-2">
                Need an account? Register
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
