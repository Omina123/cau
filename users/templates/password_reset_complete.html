<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | St. Peters Ngoisa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --vatican-gold: #FFD700;
            --vatican-dark: #212529;
            --vatican-accent: #C9A227;
            --success-green: #28a745;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://www.transparenttextures.com/patterns/cubes.png'),
                        linear-gradient(135deg, var(--vatican-gold), #FFFFFF);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center;
            border-bottom: 8px solid var(--success-green);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
            animation: bounceIn 0.8s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        h2 {
            font-weight: 800;
            color: var(--vatican-dark);
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #6c757d;
            margin-bottom: 30px;
        }

        .btn-login {
            background: var(--vatican-dark);
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            color: var(--vatican-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            width: 100%;
        }

        .btn-login:hover {
            background-color: #000;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="success-icon">
        <i class="bi bi-patch-check-fill"></i>
    </div>
    
    <h2>Update Successful</h2>
    <p>Your password has been changed successfully. You can now use your new credentials to log in to the portal.</p>

    <a href="{% url 'Login' %}" class="btn-login">
        <i class="bi bi-unlock-fill me-2"></i> Login Now
    </a>

    <div class="mt-4 small text-muted">
        <i class="bi bi-info-circle me-1"></i> St. Peters Ngoisa Parish Portal
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
