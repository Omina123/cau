{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | St. Peters Ngoisa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --vatican-gold: #FFD700;
            --vatican-gold-dark: #C9A227;
            --vatican-charcoal: #212529;
        }

        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .confirm-card {
            max-width: 450px;
            width: 90%;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 6px solid var(--vatican-gold);
        }

        .header-icon {
            width: 60px;
            height: 60px;
            background: #fff9db;
            color: var(--vatican-gold-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        h2 {
            font-weight: 800;
            color: var(--vatican-charcoal);
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .instruction-text {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* Styling the Django Form (form.as_p) */
        form p {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
            color: var(--vatican-charcoal);
            font-size: 0.85rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--vatican-gold);
            box-shadow: 0 0 0 0.25rem rgba(255, 215, 0, 0.15);
        }

        /* Help text generated by Django */
        .helptext {
            display: block;
            font-size: 0.75rem;
            color: #adb5bd;
            margin-top: 5px;
            line-height: 1.3;
        }

        .errorlist {
            color: #dc3545;
            list-style: none;
            padding: 0;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .btn-update {
            background-color: var(--vatican-charcoal);
            color: var(--vatican-gold);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-update:hover {
            background-color: #333;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="header-icon">
        <i class="bi bi-key-fill"></i>
    </div>
    
    <h2>Set a New Password</h2>
    <p class="instruction-text">Please enter your new password below to regain access to your parish account.</p>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger py-2 small">
                Please correct the errors below.
            </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit" class="btn-update">
            <i class="bi bi-check2-circle me-2"></i> Update Password
        </button>
    </form>
</div>

</body>
</html>
